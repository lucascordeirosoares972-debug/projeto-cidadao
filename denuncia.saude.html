<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denúncia</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/denuncia.css">
</head>
<body>
    <header>
        <h1>Cidadão <span>Ativo</span></h1>

        <nav>
            <a href="index.html">Início</a>
            <a href="denuncia-principal.html">Denúncia</a>
            <a href="voluntariado-saude.html">Voluntariado</a>
            <a href="cadastro.html">Acompanhar</a>
            <a href="login.html">Login</a>
            <a href="sobre.html">Sobre</a>
        </nav>
    </header>
    
   <div class="container formulario_border">
    <form class="formulario" action="https://formsubmit.co/lucascordeirosoares972@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="Nova denúncia - Cidadão Ativo">
    <input type="hidden" name="_captcha" value="false">
        <fieldset class="grupo">

    <h2>Registrar Denúncia de Saúde</h2>
    <label for="nome">Nome: </label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required> <br> 

    <label for="cpf">CPF: </label>
    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required> <br>

    <label for="telefone">Telefone: </label>
    <input type="tel" id="telefone" name="telefone" placeholder="(00)00000-0000" maxlength="14" required> <br>

    <label for="email">Email: </label>
    <input type="email" id="email" name="email" placeholder="Digite seu Email" required> <br> 
    
    <label for="endereco">Endereço: </label>
    <input type="text" id="endereco" name="endereco" placeholder="Digite seu Endereço" required> <br> 


    <label for="prioridade">Prioridade do Problema: </label> 
    <select name="prioridade" id="prioridade">
        <option value="" disabled selected>Selecione uma prioridade</option>
        <option value="Baixa">Baixa</option>
        <option value="Média">Média</option>
        <option value="Alta">Alta</option>
    </select>  <br>

    <label for="imagem">Enviar imagem:</label>
    <input type="file" id="imagem">
    <br>

    <label for="obs">Descrição do Problema:</label>
    <br> 
    <textarea id="obs" name="observacoes" rows="5" cols="40" placeholder="Descreva o problema..."></textarea>
    <br>

    <button type="submit">Enviar</button>
    

    <a href="saude.html">
    <button type="button">Voltar</button> </a>
        </fieldset>
    </form>
</div>




</body>
</html>
